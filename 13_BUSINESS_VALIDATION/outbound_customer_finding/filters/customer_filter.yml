version: V1.0

purpose:
  四川城市高价值光伏客户过滤规则


target:

  region:
    include:
      - 四川
      - 成都
      - 绵阳
      - 德阳
      - 乐山
      - 眉山


  property_type:

    priority:
      - 别墅
      - 独栋住宅
      - 叠拼
      - 花园洋房
      - 阳光房


  acceptable_signal:

    - 想安装光伏
    - 了解光伏价格
    - 咨询安装方式
    - 询问收益
    - 询问储能


exclude:

  - 农村免费光伏
  - 免费安装光伏
  - 租赁屋顶
  - 光伏加盟
  - 光伏代理
  - 组件批发


quality_rule:

  must_have:

    - 明确住宅场景
    - 存在光伏兴趣信号


reject:

  - 无住宅信息
  - 单纯行业讨论
  - 新闻资讯
