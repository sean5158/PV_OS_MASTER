name: lead_scoring_agent

version: V2.0


description: >
  PV_OS销售线索评分Agent。
  根据客户需求、区域价值、房屋价值、
  评论真实性和时间价值，
  对潜在客户进行优先级排序。



mission:

  primary_goal: >

    找出四川、重庆、贵州地区
    高转化概率家庭光伏客户。

    优先识别成都及重点城市高价值客户。



business_priority:

  level: P0

  category:

    - sales_conversion



input:


  source:

    - comment_analyzer_output



  reference_rules:


    - 00_SYSTEM/PV_OS_CUSTOMER_SCOPE_RULES.md

    - 02_DATA/03_REGION_LIBRARY/REGION_MASTER.md

    - 02_DATA/03_REGION_LIBRARY/REGION_MATCH_RULE.md




analysis:


  scoring_model:


    total_score:

      max: 100




    factors:



      # 购买需求强度

      intent_score:


        weight: 40


        rules:


          S:


            keywords:


              - 想安装

              - 准备装

              - 多少钱

              - 报价

              - 联系



          A:


            keywords:


              - 效果怎么样

              - 收益多少

              - 靠谱吗



          B:


            keywords:


              - 了解一下

              - 什么原理




      # 区域价值

      region_score:


        weight: 20


        reference:


          - 02_DATA/03_REGION_LIBRARY/REGION_MATCH_RULE.md



        priority:


          P0:


            examples:


              - 成都区县

              - 成都


            score:


              district_confirmed:20

              city_confirmed:18



          P1:


            examples:


              - 四川其他城市

              - 重庆重点区域


            score:


              city_confirmed:16

              region_confirmed:15



          P2:


            examples:


              - 贵州重点城市


            score:


              city_confirmed:15



          unknown:


            score: 10




      # 房屋价值


      property_score:


        weight: 20



        rules:


          high:


            score: 20


            keywords:


              - 别墅

              - 独栋

              - 叠拼

              - 阳光房

              - 花园洋房



          medium:


            score: 15


            keywords:


              - 自建房

              - 屋顶

              - 楼顶

              - 住宅



          low:


            score: 5




      # 评论真实性


      authenticity_score:


        weight: 10



        rules:


          high:


            keywords:


              - 我家

              - 我这里

              - 我的房子

              - 我准备



          medium:


            keywords:


              - 有没有

              - 能不能




      # 时间价值


      time_score:


        weight: 10



        rules:


          recent:


            days: 7

            score: 10



          normal:


            days: 30

            score: 8




lead_grade:



  S:


    score:


      min: 80



    action:


      - 立即销售跟进



  A:


    score:


      min: 60



    action:


      - 重点培育



  B:


    score:


      min:35



    action:


      - 长期运营



  C:


    score:


      max: 35



    action:


      - 数据保存




business_rules:


  priority_order:


    1:

      成都区县


    2:

      成都城市


    3:

      四川其他城市


    4:

      重庆重点区域


    5:

      贵州重点城市


    6:

      其他区域




output:


  path:


    - 05_CUSTOMER_CRM/leads/



  fields:


    - lead_id

    - province

    - city

    - district

    - region_priority

    - intent_level

    - property_type

    - score

    - lead_grade

    - follow_action




workflow:


  - receive_comment_analysis

  - evaluate_region_value

  - evaluate_purchase_intent

  - evaluate_property_value

  - calculate_score

  - generate_lead




constraints:


  forbidden:


    - 粉丝数量影响客户评分

    - 删除目标区域模糊客户

    - 忽略区县级客户

    - 脱离区域库自行定义市场范围



status:

  development: true
