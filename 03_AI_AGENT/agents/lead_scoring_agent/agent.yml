name: lead_scoring_agent

version: V1.1


description: >
  PV_OS销售线索评分Agent。
  对评论分析后的潜在客户进行价值排序，
  输出销售优先级。


mission:

  primary_goal: >

    找出四川、重庆、贵州地区
    高转化概率家庭光伏客户。


business_priority:

  level: P0

  category:
    sales_conversion



input:


  source:

    - comment_analyzer_output



analysis:


  scoring_model:


    total_score:

      max:100



    factors:


      # 购买需求强度

      intent_score:


        weight:40


        rules:


          S:

            keywords:

              - 想安装

              - 准备装

              - 多少钱

              - 报价

              - 联系


          A:

            keywords:

              - 效果怎么样

              - 收益多少

              - 靠谱吗


          B:

            keywords:

              - 了解一下

              - 什么原理



      # 区域价值

      region_score:


        weight:20


        rules:


          city_confirmed:

            score:20


            examples:

              - 成都

              - 绵阳

              - 重庆

              - 贵阳



          province_confirmed:

            score:15



          vague_region:

            score:10



      # 房屋价值

      property_score:


        weight:20


        rules:


          high:


            score:20


            keywords:


              - 别墅

              - 独栋

              - 叠拼

              - 阳光房



          medium:


            score:15


            keywords:


              - 自建房

              - 屋顶

              - 住宅



          low:


            score:5



      # 评论真实性

      authenticity_score:


        weight:10


        rules:


          high:


            keywords:


              - 我家

              - 我这里

              - 我的房子

              - 我准备



          medium:


            keywords:


              - 有没有

              - 能不能



      # 时间价值

      time_score:


        weight:10


        rules:


          recent:

            days:7

            score:10


          normal:

            days:30

            score:8



lead_grade:


  S:


    score:

      min:80


    action:

      - 立即销售跟进



  A:


    score:

      min:60


    action:

      - 重点培育



  B:


    score:

      min:35


    action:

      - 长期运营



  C:


    score:

      max:35


    action:

      - 数据保存



business_rules:


  priority_order:


    1:

      成都/重庆/贵阳等城市


    2:

      别墅/叠拼/阳光房


    3:

      明确安装咨询


    4:

      普通住宅


    5:

      泛行业讨论



output:


  path:


    - 05_CUSTOMER_CRM/leads/



  fields:


    - lead_id

    - customer_region

    - customer_city

    - intent_level

    - property_type

    - score

    - lead_grade

    - follow_action



constraints:


  forbidden:


    - 粉丝数量影响客户评分

    - 农村客户全部删除

    - 没有城市信息直接判无效


status:

  development: true
