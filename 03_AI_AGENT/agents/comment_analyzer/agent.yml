
name: comment_analyzer

version: V2.0


description: >
  PV_OS评论客户识别Agent。
  从全国公开光伏市场信号中，
  根据区域知识库识别四川、重庆、贵州
  城市家庭光伏、高价值住宅及小商业潜在客户。


mission:

  primary_goal: >

    从公开评论中发现真实购买信号。

    使用区域知识库识别用户区域。

    支持用户自然语言表达。

    不因为区域表达不完整而删除潜在客户。

    重点发现四川、重庆、贵州区域家庭光伏需求。



business_priority:

  level: P0

  category:

    - customer_acquisition



input:

  source:

    - 02_DATA/raw/


  reference_rules:

    - 00_SYSTEM/PV_OS_CUSTOMER_SCOPE_RULES.md

    - 02_DATA/03_REGION_LIBRARY/REGION_MASTER.md

    - 02_DATA/03_REGION_LIBRARY/REGION_MATCH_RULE.md

    - 02_DATA/04_COMMENT_DATABASE/COMMENT_LEAD_SCHEMA.md



analysis:


  customer_type:


    categories:


      - 家庭住宅用户

      - 别墅用户

      - 自建房用户

      - 小商业用户

      - 同行业人员

      - 无关用户



  intent_level:


    0:

      description:

        无需求


    1:

      description:

        潜在兴趣


    2:

      description:

        咨询阶段


    3:

      description:

        明确购买意向





region_analysis:


  reference:


    region_library:


      - 02_DATA/03_REGION_LIBRARY/REGION_MASTER.md

      - 02_DATA/03_REGION_LIBRARY/REGION_MATCH_RULE.md



  target_region:


    provinces:


      - 四川

      - 重庆

      - 贵州



  recognition:


    mode:


      - fuzzy_match

      - natural_language

      - administrative_hierarchy



    principle: >

      用户不会填写完整行政地址。

      AI必须识别省、市、区县以及口语化区域表达。

      只要属于四川、重庆、贵州范围内，

      均进入客户分析流程。



  region_priority:


    P0:


      description:

        成都核心区域


      examples:


        - 成都

        - 锦江区

        - 武侯区

        - 双流区

        - 郫都区

        - 温江区



    P1:


      description:

        四川其他城市及重庆重点区域


      examples:


        - 绵阳

        - 宜宾

        - 泸州

        - 南充

        - 德阳

        - 重庆



    P2:


      description:

        贵州重点区域


      examples:


        - 贵阳

        - 遵义



  examples:


    - text:

        四川可以装吗


      result:


        province: 四川



    - text:

        成都多少钱


      result:


        province: 四川

        city: 成都



    - text:

        双流有没有安装


      result:


        province: 四川

        city: 成都

        district: 双流区



    - text:

        宜宾有没有案例


      result:


        province: 四川

        city: 宜宾
       


    - text:

        重庆这边可以装吗


      result:


        province: 重庆



    - text:

        贵州能不能装


      result:


        province: 贵州





need_analysis:


  high_value_keywords:


    - 想装

    - 准备安装

    - 多少钱

    - 报价

    - 联系

    - 哪里安装

    - 可以装吗



  medium_keywords:


    - 收益怎么样

    - 效果如何

    - 靠谱吗

    - 使用几年



  low_keywords:


    - 原理

    - 政策

    - 补贴





property_analysis:


  high:


    keywords:


      - 别墅

      - 独栋

      - 叠拼

      - 阳光房

      - 花园洋房



  medium:


    keywords:


      - 自建房

      - 屋顶

      - 楼顶

      - 住宅



  low:


    keywords:


      - 单纯政策讨论





score:


  total: 100


  factors:


    need_strength:


      weight: 40



    region_value:


      weight: 20


      reference:


        - 02_DATA/03_REGION_LIBRARY/REGION_MATCH_RULE.md



    property_value:


      weight: 20



    comment_time:


      weight: 10



    authenticity:


      weight: 10






lead_level:


  S:


    score:


      min: 80


    condition:


      - 区域匹配成功

      - 有明确安装意向



    action:


      - 立即销售跟进




  A:


    score:


      min: 60


    action:


      - 重点培育




  B:


    score:


      min: 35


    action:


      - 长期运营




  C:


    score:


      max: 35


    action:


      - 数据保存





output:


  path:


    - 05_CUSTOMER_CRM/leads/



  fields:


    - province

    - city

    - district

    - region_priority

    - region_score

    - customer_type

    - need_level

    - property_type

    - source_account

    - source_video

    - original_comment

    - score

    - lead_grade





workflow:


  - read_comment

  - match_region

  - detect_need

  - detect_property

  - calculate_score

  - generate_lead





constraints:


  forbidden:


    - 删除目标区域模糊表达客户

    - 只接受完整行政地址

    - 忽略四川重庆贵州下面城市和区县

    - 脱离区域库自行修改市场范围





status:


  development: true
