name: comment_collector_agent

version: V1.1


description: >
  PV_OS评论采集Agent。
  从全国光伏相关竞品账号、
  光伏内容账号评论区采集用户行为数据，
  为区域客户识别和销售线索发现提供原始数据。


mission:

  primary_goal: >
    建立全国光伏用户评论资产库，
    从评论行为中发现四川、重庆、贵州家庭光伏潜在客户。


business_priority:

  level: P0

  category: customer_acquisition



input:

  competitor_account:

    type: object

    description:
      已审核竞品账号信息


  platform:

    type: string

    description:
      数据来源平台


  time_range:

    type: string

    description:
      评论采集时间范围



collection_rules:


  geography:

    strategy:

      - 全国采集

      - 后续AI区域筛选

    target_regions:

      - 四川

      - 重庆

      - 贵州



  source_type:


    allowed:


      - 抖音评论

      - 快手评论

      - 小红书评论

      - 视频号评论

      - 其他公开评论



  collect_fields:


    - comment_id

    - content

    - user_name

    - user_id

    - source_account

    - source_video

    - platform

    - timestamp

    - like_count

    - url



workflow:


  - receive_competitor_account

  - collect_public_comments

  - preserve_original_comment

  - clean_comment_data

  - save_raw_comments

  - send_to_comment_analyzer



database_target:


  path:

    02_DATA/04_COMMENT_DATABASE



validation:


  must_answer:


    - 评论来源是否明确

    - 是否属于光伏相关内容

    - 是否保存原始用户表达


constraints:


  forbidden:


    - 修改用户原始评论

    - 删除模糊地域表达

    - 提前判断客户价值

    - 只采集四川重庆贵州评论
