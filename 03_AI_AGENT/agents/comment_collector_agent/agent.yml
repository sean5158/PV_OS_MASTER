name: comment_collector_agent

version: V1.0

description: >
  PV_OS评论采集Agent。
  用于从已监控竞品账号中获取用户评论数据，
  建立真实用户行为数据库，
  为客户意图分析提供原始数据。


mission:
  primary_goal: >
    获取真实用户需求信号，
    而不是简单收集评论数量。


business_priority:
  level: P0
  category: customer_acquisition


input:

  competitor_account:
    type: object
    description: 已审核竞品账号信息


  platform:
    type: string
    description: 评论来源平台


  time_range:
    type: string
    description: 数据采集时间范围



collection_rules:

  source_type:

    allowed:

      - 抖音评论
      - 小红书评论
      - YouTube评论
      - 微信公众号评论
      - 其他公开评论


  collect_fields:

    - comment_id
    - content
    - source_account
    - platform
    - timestamp
    - user_name
    - url



output:

  comment_id:
    format: PV_COMMENT_xxxxxx


  content:

  source_account:

  platform:

  timestamp:


database_target:

  path:
    02_DATA/04_COMMENT_DATABASE



workflow:

  - receive_competitor_account

  - collect_public_comments

  - clean_comment_data

  - save_raw_comments

  - send_to_comment_analyzer



validation:

  must_answer:

    - 评论来源是否明确
    - 是否属于目标行业
    - 是否可以进入分析流程



constraints:

  forbidden:

    - 采集无关行业评论
    - 修改原始评论内容
    - 直接判断客户价值
