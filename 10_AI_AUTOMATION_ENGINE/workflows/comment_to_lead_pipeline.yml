version: 2.0


description:
  光伏评论自动分析、区域识别、客户评分、线索分流流程



trigger:

  event:

    - new_comment_received




steps:



  # 1. 评论采集


  - name: collect_comment


    input:


      path:


        - 02_DATA/raw/





  # 1.5 竞品来源价值分析


  - name: analyze_source_account


    agent:


      - competitor_account_agent



    reference:


      rules:


        - 02_DATA/02_COMPETITOR_DATABASE/COMPETITOR_ACCOUNT_MODEL.md

        - 02_DATA/02_COMPETITOR_DATABASE/COMPETITOR_SCORE_RULE.md




    output:


      fields:


        - account_category

        - account_authority_score

        - customer_source_score






  # 2. 评论资产保存


  - name: save_comment_asset



    output:


      path:


        - 05_CUSTOMER_LEADS/comment_asset_library.csv



    rule:


      keep_history: true



      note:


        全量保存评论资产，不因时间淘汰






  # 3. 时间价值判断



  - name: evaluate_comment_time



    rule:


      recent_window:


        days: 7



      recent_comments:


        sales_priority: true



      historical_comments:


        asset_storage: true






  # 4. 区域匹配


  - name: match_customer_region



    agent:


      - comment_analyzer



    reference:


      rules:


        - 00_SYSTEM/PV_OS_CUSTOMER_SCOPE_RULES.md

        - 02_DATA/03_REGION_LIBRARY/REGION_MASTER.md

        - 02_DATA/03_REGION_LIBRARY/REGION_MATCH_RULE.md





    recognition:


      mode:


        - fuzzy_match

        - natural_language

        - administrative_hierarchy



      principle: >


        全国评论均可进入分析。

        AI根据区域知识库识别四川、重庆、贵州

        省、市、区县及自然语言表达。

        不因用户区域表达不完整而删除。





    output:


      fields:


        - province

        - city

        - district

        - region_priority

        - region_score






  # 5. AI评论分析



  - name: analyze_comment



    agent:


      - comment_analyzer




    reference:


      rules:


        - 02_DATA/04_COMMENT_DATABASE/COMMENT_ANALYZER_RULE.md

        - 02_DATA/04_COMMENT_DATABASE/COMMENT_TIME_AND_MATCH_RULE.md






  # 6. 客户评分



  - name: score_customer



    agent:


      - lead_scoring_agent




    reference:


      rules:


        - 02_DATA/06_SCORE_MODEL/CUSTOMER_SCORE_MODEL.md

        - 02_DATA/03_REGION_LIBRARY/REGION_MATCH_RULE.md






  # 7. 客户分流



  - name: route_customer




    condition:




      S_or_A:



        output:


          path:


            - 05_CUSTOMER_LEADS/leads_master.csv



      B:



        output:


          path:


            - 05_CUSTOMER_LEADS/nurture_pool.csv



      C:



        output:


          path:


            - 05_CUSTOMER_LEADS/comment_asset_library.csv







  # 8. CRM同步



  - name: create_crm_lead




    condition:



      if:


        lead_grade: S



      output:



        path:


          - 05_CUSTOMER_CRM/leads/hot/




      else:



        path:


          - 05_CUSTOMER_CRM/leads/qualified/







  # 9. 跟进任务生成



  - name: generate_follow_up




    condition:



      lead_grade:


        - S

        - A




    output:


      path:


        - 05_CUSTOMER_CRM/follow_ups/






status:


  enabled: true






version_history:


  - version: V1.0

    date: 2026-07-12

    note:

      创建评论到客户线索自动流程



  - version: V1.1

    date: 2026-07-12

    note:

      增加评论资产库、
      7天销售窗口、
      S/A/B/C客户分流、
      区域规则引用



  - version: V1.2

    date: 2026-07-15

    note:

      增加竞品来源价值分析、
      川渝黔区域识别、
      评论获客链路优化



  - version: V2.0

    date: 2026-07-19

    note:

      升级区域智能识别能力。

      接入四川、重庆、贵州三级区域知识库。

      支持省、市、区县和模糊自然语言匹配。
